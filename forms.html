<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Forms</title>
</head>
<body>
    <form>
        <label>Name: </label><input type="text"><br><br>
        Phone number:<input type="number"><br><br>
        Password: <input type="password"><br><br>
        Email: <input type="email"><br><br>
        File: <input type="file"><br><br>
        DOB: <input type="date"><br><br>
        Time: <input type="time"><br><br>

        <!-- 1st Method -->
        <input type="submit">
        <input type="reset">

        <!-- 2nd Method -->
         <!-- <button type="submit">Hello</button> -->

         <h2>Checkbox</h2>
         <h4>My Hobbies</h4>
         <input type="checkbox"><label>Coding</label><br>
         <input type="checkbox"><label>Watching Sports</label><br>
         <input type="checkbox"><label>Sleeping💤</label><br>

         <h2>Radio Button</h2>
         <h4>Gender</h4>
         <input type="radio" name="gender">Male
         <input type="radio" name="gender">Female
         <input type="radio" name="gender">Others
    </form>
</body>
</html>
