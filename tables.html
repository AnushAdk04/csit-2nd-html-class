<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table and Nested Table</title>
</head>
<body>
    <h2>Row Span and Col Span:</h2>
    <table border="1">
        <tr>
            <th colspan="2">Class Routine</th>
        </tr>
        <tr>
            <th>Day</th>
            <th>Subject</th>
        </tr>
        <tr>
            <td>Sunday</td>
            <td>Statistics</td>
        </tr>
        <tr>
            <td>Monday</td>
            <td rowspan="2">Microproessor</td>
        </tr>
        <tr>
            <td>Tuesday</td>
        </tr>
    </table>
</body>
</html>
